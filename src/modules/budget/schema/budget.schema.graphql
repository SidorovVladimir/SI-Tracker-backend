# 📊 Сумма затрат на конкретный месяц года
type BudgetMonthData {
  month: Int! # Номер месяца (1 - 12)
  totalCost: Int! # Сумма затрат в рублях
}

# 📋 Строка бюджетного отчета (Компания, Город или Площадка)
type BudgetRow {
  rowId: ID! # ID сущности, по которой сгруппировали (UUID компании/города/площадки)
  rowName: String! # Отображаемое название (например, "ООО Газпром" или "Новосибирск")
  months: [BudgetMonthData!]! # Сетка расходов по всем 12 месяцам (всегда 12 элементов)
  totalYearCost: Int! # Итоговая сумма расходов за весь год по этой строке
}

# 📦 Монолитный ответ матрицы планирования бюджета
type BudgetMatrixResponse {
  targetYear: Int! # Выбранный год планирования
  rows: [BudgetRow!]! # Список всех сформированных строк отчета
  grandTotal: Int! # Общая сумма бюджета по всему предприятию за год
}

# 🔄 Варианты группировки финансовой аналитики
enum BudgetGroupBy {
  COMPANY # Группировать строки по Юридическим лицам
  CITY # Группировать строки по Географическим регионам (Городам)
  SITE # Группировать строки по Производственным площадкам (Участкам)
}

type BudgetPlan {
  id: ID!
  year: Int!
  status: String! # 'draft' | 'approved'
  comment: String
  createdAt: String!
  updatedAt: String!
  # Статистические поля для фронтенда
  totalCount: Int!
  matchedCount: Int!
  totalCost: Float!
}

type BudgetPlanItem {
  id: ID!
  budgetPlanId: ID!
  deviceId: ID!
  deviceName: String!
  deviceModel: String!
  matchedPricelistItemId: ID
  matchMethod: String! # 'grsi' | 'csm_code' | 'manual'
  basePrice: Float!
  vatRate: Float!
  totalCost: Float!
  matchHistorySku: String
  device: Device! # Связка с текущей карточкой прибора
}

type BudgetPlanItemsResponse {
  items: [BudgetPlanItem!]!
  totalCount: Int!
  totalCostAll: Float!
}

input BudgetPlanFilterInput {
  matchMethod: String
  searchQuery: String # Поиск по имени или модели прибора
  city: ID
  company: ID
  productionSite: ID
}

type VerificationOrganizationRelation {
  id: ID!
  name: String!
}

type Pricelist {
  id: ID!
  verificationOrganizationId: ID!
  title: String!
  year: Int!
  isRegulated: Boolean!
  createdAt: String!
  verificationOrganization: VerificationOrganizationRelation!
}

input PricelistItemInput {
  grsiNumber: String
  csmCode: String
  # name: String!
  # modelOrType: String
  price: Float!
}

input CreatePricelistInput {
  verificationOrganizationId: ID!
  title: String!
  year: Int!
  isRegulated: Boolean!
  items: [PricelistItemInput!]! # Массив строк, распарсенных и сопоставленных на клиенте
}

type BudgetPlanDistributionRow {
  groupId: ID!
  groupName: String! # Имя компании, города или цеха
  count: Int! # Количество приборов в этой группе
  baseSubtotal: Float! # Плановая сумма без НДС
  totalCost: Float! # Итоговая плановая сумма с НДС
}

input DeviceFilterInput {
  deviceName: String
  matchMethod: String
  # 🎯 Фильтры для мгновенной селекции по карточкам холдинга
  cityId: ID
  companyId: ID
  productionSiteId: ID
}

type Query {
  # 🎯 Главный запрос для вывода финансовой матрицы с поддержкой каскадных фильтров ЦФО
  getBudgetMatrix(
    targetYear: Int!
    groupBy: BudgetGroupBy!
    companyId: ID
    cityId: ID
    siteId: ID
  ): BudgetMatrixResponse!

  budgetPlans: [BudgetPlan!]!
  budgetPlan(id: ID!): BudgetPlan
  budgetPlanItems(
    budgetId: ID!
    limit: Int!
    offset: Int!
    filter: BudgetPlanFilterInput
  ): BudgetPlanItemsResponse!
  pricelists: [Pricelist!]!
  pricelist(id: ID!): Pricelist
  getBudgetPlanDistribution(
    budgetId: ID!
    groupBy: String! # 'company' | 'city' | 'production_site'
  ): [BudgetPlanDistributionRow!]!

  getCsmTariffTrend(siteId: String!): CsmTariffTrendResponse!
  getVerificationRisks: VerificationRisksResponse!
}

input CreateBudgetPlanInput {
  year: Int!
  comment: String
  vatRate: Float!
  calculationMethod: String!
  pricelistIds: [ID!] # Какие прайсы использовать для каскада
  cityId: ID
  companyId: ID
  productionSiteId: ID
}

input UpdateBudgetPlanItemPriceInput {
  itemId: ID!
  manualPrice: Float! # Ручное переопределение цены пользователем
}

type Mutation {
  createBudgetPlan(input: CreateBudgetPlanInput!): BudgetPlan!
  updateBudgetPlanItemPrice(
    input: UpdateBudgetPlanItemPriceInput!
  ): BudgetPlanItem!
  approveBudgetPlan(id: ID!): BudgetPlan!
  deleteBudgetPlan(id: ID!): Boolean!
  createPricelist(input: CreatePricelistInput!): QueuedJobResponse!
  deletePricelist(id: ID!): Boolean!
}

type CsmTariffTimelinePoint {
  year: Int! # Календарный год тарифа (например, 2024, 2025, 2026)
  price: Float! # Стоимость поверки прибора без НДС в этот период
  csmName: String! # Название ЦСМ, предоставившего тариф (например, "Новосибирский ЦСМ")
}

type CsmTariffTrendResponse {
  serviceName: String! # Актуальное текстовое название услуги для заголовка
  timeline: [CsmTariffTimelinePoint!]! # Хронологический массив точек изменения цен
}

type RiskSiteData {
  id: ID!
  name: String!
  status: String! # Критический статус: 'green' | 'warning' | 'error'
  totalCount: Int! # Всего приборов на участке
  expiredCount: Int! # Просрочено поверок
  warningCount: Int! # Поверка заканчивается в течение 30 дней
}

# 2. Данные по юридическому лицу / компании
type RiskCompanyData {
  id: ID!
  name: String!
  status: String!
  totalCount: Int!
  expiredCount: Int!
  warningCount: Int!
  sites: [RiskSiteData!]! # Вложенный список цехов этой компании
}

# 3. Данные по географическому региону / городу
type RiskCityData {
  id: ID!
  name: String!
  status: String!
  totalCount: Int!
  expiredCount: Int!
  warningCount: Int!
  companies: [RiskCompanyData!]! # Вложенный список компаний в этом городе
}

# 4. Монолитный корневой ответ дерева рисков
type VerificationRisksResponse {
  cities: [RiskCityData!]!
}
