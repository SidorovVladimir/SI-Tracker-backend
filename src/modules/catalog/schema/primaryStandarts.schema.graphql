type PrimaryStandart {
  id: ID!
  name: String!
  description: String
  createdAt: String!
  updatedAt: String!
}

type Query {
  primaryStandarts: [PrimaryStandart!]!
  primaryStandart(id: ID!): PrimaryStandart!
}

input CreatePrimaryStandartInput {
  name: String!
  description: String
}

input UpdatePrimaryStandartInput {
  name: String!
  description: String
}

type Mutation {
  createPrimaryStandart(input: CreatePrimaryStandartInput!): PrimaryStandart!
  updatePrimaryStandart(
    id: ID!
    input: UpdatePrimaryStandartInput!
  ): PrimaryStandart!
  deletePrimaryStandart(id: ID!): Boolean!
}
