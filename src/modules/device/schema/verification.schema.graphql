type Verification {
  id: ID!
  date: String
  validUntil: String
  result: String
  protocolNumber: String
  organization: String
  comment: String
  documentUrl: String
  metrologyControleTypeId: ID
  verificationOrganizationId: ID
  deviceId: ID!
  createdAt: String!
  updatedAt: String!
}
type VerificationRelation {
  id: ID!
  date: String
  validUntil: String
  result: String
  protocolNumber: String
  organization: String
  comment: String
  documentUrl: String
  metrologyControleType: MetrologyControlType
