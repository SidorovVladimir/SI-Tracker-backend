type Verification {
  id: ID!
  date: String
  validUntil: String
  result: String
  protocolNumber: String
  organization: String
  comment: String
  documentUrl: String
  metrologyControleTypeId: ID
  verificationOrganizationId: ID
  deviceId: ID!
  cost: Float
  createdAt: String!
  updatedAt: String!
}
type VerificationRelation {
  id: ID!
  date: String
  validUntil: String
  result: String
  protocolNumber: String
  organization: String
  comment: String
  documentUrl: String
  metrologyControleType: MetrologyControlType
  verificationOrganization: VerificationOrganization
  deviceId: ID!
  cost: Float
  createdAt: String!
  updatedAt: String!
}

input VerificationInput {
  id: ID
  date: String
  validUntil: String
  result: String
  protocolNumber: String
  organization: String
  comment: String
  documentUrl: String
  metrologyControleTypeId: ID
  verificationOrganizationId: ID
  cost: Float
}

type VerificationModal {
  id: ID!
  deviceId: ID!
  batchId: ID
  protocolNumber: String!
  result: String!
  date: String!
  validUntil: String
  metrologyControleTypeId: ID!
  verificationOrganizationId: ID!
  comment: String
  cost: Float
  createdAt: String!
  updatedAt: String!
}

input CreateVerificationInput {
  deviceId: ID!
  batchId: ID
  protocolNumber: String!
  result: String!
  date: String!
  validUntil: String
  metrologyControleTypeId: ID!
  verificationOrganizationId: ID!
  comment: String
  cost: Float
}

type ArshinFlexibleVerification {
  arshinId: ID!
  protocolNumber: String!
  date: String!
  validUntil: String
  isApplicable: Boolean!
  organizationName: String!
  documentUrl: String!
}

input FetchArshinVerificationsInput {
  grsiNumber: String!
  serialNumber: String!
  count: Int!
}

type Query {
  fetchArshinVerifications(
    input: FetchArshinVerificationsInput!
  ): [ArshinFlexibleVerification!]!

  findArshinDocumentUrl(protocolNumber: String!): String
}

type Mutation {
  createVerification(input: CreateVerificationInput!): VerificationModal!
}
