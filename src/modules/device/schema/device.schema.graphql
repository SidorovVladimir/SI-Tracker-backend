type Device {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  statusId: ID!
  productionSiteId: ID!
  equipmentTypeId: ID
  createdAt: String!
  updatedAt: String!
}

input DeviceFilterInput {
  city: String
  company: String
  productionSite: String
  deviceName: String
  serialNumber: String
  status: String
  metrologyControle: String
  dateStart: String
  dateEnd: String
}

type DevicesWithRelationsResponse {
  items: [DeviceTableItem!]!
  totalCount: Int!
}

type DeviceWithRelations {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  equipmentType: EquipmentType
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  status: Status!
  productionSite: ProductionSiteRelation!
  verifications: [VerificationRelation!]!
  scopes: [Scope!]!
  primaryStandarts: [PrimaryStandart!]!
  measurementTypes: [MeasurementType!]!
}

type DeviceTableItem {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  receiptDate: String
  grsiNumber: String
  inventoryNumber: String
  manufacturer: String
  verificationInterval: Int
  status: Status!
  productionSite: ProductionSiteRelation!
  latestVerification: VerificationTableItem
}

type VerificationTableItem {
  id: ID!
  date: String
  validUntil: String
  protocolNumber: String
  metrologyControleType: MetrologyControlType
}

type Query {
  devices: [Device!]!
  device(id: ID!): DeviceWithRelations
  # devicesWithRelations: [DeviceWithRelations!]!

  devicesWithRelations(
    limit: Int!
    offset: Int!
    filter: DeviceFilterInput
  ): DevicesWithRelationsResponse!
}

input CreateDeviceInput {
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  statusId: ID!
  productionSiteId: ID!
  equipmentTypeId: ID
  scopes: [ID!]
  primaryStandarts: [ID!]
  measurementTypes: [ID!]
  verifications: [VerificationInput!]
}

input UpdateDeviceInput {
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  statusId: ID!
  productionSiteId: ID!
  equipmentTypeId: ID
  scopes: [ID!]
  primaryStandarts: [ID!]
  measurementTypes: [ID!]
  verifications: [VerificationInput!]
}

type Mutation {
  createDevice(input: CreateDeviceInput!): Device!
  deleteDevice(id: ID!): Boolean!
  updateDevice(id: ID!, input: UpdateDeviceInput!): Device!
}
