scalar JSON

type Device {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  statusId: ID!
  productionSiteId: ID!
  equipmentTypeId: ID
  createdAt: String!
  updatedAt: String!
}

input DeviceFilterInput {
  city: String
  company: String
  productionSite: String
  deviceName: String
  serialNumber: String
  status: String
  metrologyControle: String
  dateStart: String
  dateEnd: String
  archived: Boolean
  includeArchived: Boolean
}

type DevicesWithRelationsResponse {
  items: [DeviceTableItem!]!
  totalCount: Int!
}

type DeviceWithRelations {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  equipmentType: EquipmentType
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  status: Status!
  productionSite: ProductionSiteRelation!
  verifications: [VerificationRelation!]!
  scopes: [Scope!]!
  primaryStandarts: [PrimaryStandart!]!
  measurementTypes: [MeasurementType!]!
}

type DeviceTableItem {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  receiptDate: String
  grsiNumber: String
  inventoryNumber: String
  manufacturer: String
  verificationInterval: Int
  status: Status!
  archived: Boolean
  productionSite: ProductionSiteRelation!
  latestVerification: VerificationTableItem
}

type VerificationTableItem {
  id: ID!
  date: String
  validUntil: String
  protocolNumber: String
  metrologyControleType: MetrologyControlType
}

type RawSqlResponse {
  success: Boolean!
  columns: [String!]! # Список колонок для шапки таблицы на фронтенде
  rows: [JSON!]! # Массив строк с данными
  affectedRows: Int # Количество затронутых строк (для INSERT/UPDATE)
  errorMessage: String # Текст ошибки, если запрос упал
}

type DeviceBarcodeData {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
  controlType: String
  validUntil: String
  statusName: String
}

type JobStatusResponse {
  id: ID!
  progress: JSON
  isCompleted: Boolean!
  isFailed: Boolean!
  failedReason: String
}

type Query {
  devices: [Device!]!
  device(id: ID!): DeviceWithRelations
  # devicesWithRelations: [DeviceWithRelations!]!

  devicesWithRelations(
    limit: Int!
    offset: Int!
    filter: DeviceFilterInput
  ): DevicesWithRelationsResponse!
  getDevicesBarcodeData(ids: [ID!]!): [DeviceBarcodeData!]!

  getJobStatus(jobId: ID!): JobStatusResponse

  executeRawSql(sqlQuery: String!): RawSqlResponse!
}

input CreateDeviceInput {
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  statusId: ID!
  productionSiteId: ID!
  equipmentTypeId: ID
  scopes: [ID!]
  primaryStandarts: [ID!]
  measurementTypes: [ID!]
  verifications: [VerificationInput!]
}

input UpdateDeviceInput {
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  statusId: ID!
  productionSiteId: ID!
  equipmentTypeId: ID
  scopes: [ID!]
  primaryStandarts: [ID!]
  measurementTypes: [ID!]
  verifications: [VerificationInput!]
}

input SyncDeviceWithArshinInput {
  deviceId: ID!
  batchId: ID!
}

type DeviceBatchSyncResult {
  deviceId: ID!
  success: Boolean!
  message: String
}

# Общий ответ пакетной синхронизации
type BatchSyncResponse {
  batchId: ID!
  syncedCount: Int!
  totalCount: Int!
  details: [DeviceBatchSyncResult!]!
}

# Ответ при постановке задачи в очередь ( Аршин / импорт )
type QueuedJobResponse {
  jobId: ID!
  batchId: ID
  itemCount: Int
  message: String!
}

input ImportDeviceItemInput {
  name: String!
  model: String!
  serialNumber: String!
  grsiNumber: String
  inventoryNumber: String
  manufacturer: String
  verificationInterval: String # МПИ (приведем к Int на бэке)
  nomenclature: String
  comment: String
  cityName: String!
  companyName: String!
  productionSiteName: String!
  statusName: String!
  equipmentTypeName: String
  scopesNames: String
  measurementTypesNames: String
  primaryStandardsNames: String
  measurementRange: String
  accuracy: String
}

type Mutation {
  createDevice(input: CreateDeviceInput!): Device!
  deleteDevice(id: ID!): Boolean!
  updateDevice(id: ID!, input: UpdateDeviceInput!): Device!
  syncDeviceWithArshin(input: SyncDeviceWithArshinInput!): Device!
  syncBatchWithArshin(batchId: ID!): QueuedJobResponse!
  importDevicesFromExcel(input: [ImportDeviceItemInput!]!): QueuedJobResponse!
}
