type Device {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  statusId: ID!
  productionSiteId: ID!
  equipmentTypeId: ID
  createdAt: String!
  updatedAt: String!
}

type DeviceWithRelations {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  equipmentType: EquipmentType
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  status: Status!
  productionSite: ProductionSiteRelation!
  verifications: [VerificationRelation!]!
  scopes: [Scope!]!
  primaryStandarts: [PrimaryStandart!]!
  measurementTypes: [MeasurementType!]!
}

type Query {
  devices: [Device!]!
  device(id: ID!): DeviceWithRelations!
  devicesWithRelations: [DeviceWithRelations!]!
}

input CreateDeviceInput {
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  statusId: ID!
  productionSiteId: ID!
  equipmentTypeId: ID
  scopes: [ID!]
  primaryStandarts: [ID!]
  measurementTypes: [ID!]
  verifications: [VerificationInput!]
}

input UpdateDeviceInput {
  name: String!
  model: String!
  serialNumber: String!
  releaseDate: String
  grsiNumber: String
  measurementRange: String
  accuracy: String
  inventoryNumber: String
  receiptDate: String
  manufacturer: String
  verificationInterval: Int
  archived: Boolean!
  nomenclature: String
  comment: String
  statusId: ID!
  productionSiteId: ID!
  equipmentTypeId: ID
  scopes: [ID!]
  primaryStandarts: [ID!]
  measurementTypes: [ID!]
  verifications: [VerificationInput!]
}

type Mutation {
  createDevice(input: CreateDeviceInput!): Device!
  deleteDevice(id: ID!): Boolean!
  updateDevice(id: ID!, input: UpdateDeviceInput!): Device!
}
