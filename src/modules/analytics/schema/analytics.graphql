type FinancialMonthlyTimeline {
  month: Int!
  amount: Float!
}

type FinancialByCity {
  cityName: String!
  amount: Float!
}

type FinancialByCompany {
  companyName: String!
  amount: Float!
}

type FinancialByProductionSite {
  siteId: ID!
  fullSiteLabel: String!
  amount: Float!
}

type FinancialAnalyticsResponse {
  totalSpent: Float!
  monthlyTimeline: [FinancialMonthlyTimeline!]!
  byCities: [FinancialByCity!]!
  byCompanies: [FinancialByCompany!]!
  byProductionSites: [FinancialByProductionSite!]!
}

type AdminStats {
  devices: Int!
  users: Int!
  companies: Int!
  sites: Int!
  standards: Int!
  tariffs: Int!
}

type AnomalyDevice {
  id: ID!
  name: String!
  model: String!
  serialNumber: String!
}

type AdminAnomalies {
  missingMpi: [AnomalyDevice!]!
  missingControlType: [AnomalyDevice!]!
  missingHistory: [AnomalyDevice!]!
  statusMismatch: [AnomalyDevice!]!
}

type AdminDashboardResponse {
  stats: AdminStats!
  anomalies: AdminAnomalies!
}

type Query {
  getFinancialAnalytics(year: Int!, month: Int): FinancialAnalyticsResponse!
  getAdminDashboardStats: AdminDashboardResponse!
}
